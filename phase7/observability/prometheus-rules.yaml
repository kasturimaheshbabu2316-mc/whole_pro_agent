apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: whole-agent-alerts
  namespace: whole-agent
spec:
  groups:
    - name: whole-agent.rules
      rules:
        - alert: HighPodCpuUsage
          expr: sum(rate(container_cpu_usage_seconds_total{namespace="whole-agent"}[5m])) by (pod) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on pod {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} has high CPU usage for more than 5 minutes."
        - alert: RabbitMQQueueDepth
          expr: rabbitmq_queue_messages_ready > 100
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "RabbitMQ queue depth too high"
            description: "The RabbitMQ queue has more than 100 ready messages."
