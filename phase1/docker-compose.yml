version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: whole_agent
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
  auth_service:
    build: ./auth_service
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres/whole_agent
      - REDIS_URL=redis://redis:6379/0
  streamlit-ui:
    build:
      context: ../phase6/streamlit_app
    ports:
      - "8501:8501"
    environment:
      - AUTH_URL=http://auth_service:8000
      - RESUME_URL=http://localhost:8002
      - JOB_URL=http://localhost:8003
      - EMAIL_URL=http://localhost:8005
    depends_on:
      - auth_service
volumes:
  pg_data:
  es_data:
