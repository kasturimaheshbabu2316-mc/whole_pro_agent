name: Canary Deployment

on:
  push:
    branches:
      - main

jobs:
  canary-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push canary images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/whole-agent-job-finder:canary
            ${{ secrets.DOCKERHUB_USERNAME }}/whole-agent-email-agent:canary

      - name: Deploy canary manifest
        uses: azure/k8s-deploy@v5
        with:
          manifests: |
            phase8/k8s/network-policies.yaml
            phase7/k8s/app-services.yaml
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/whole-agent-job-finder:canary
            ${{ secrets.DOCKERHUB_USERNAME }}/whole-agent-email-agent:canary
          namespace: whole-agent
