apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: job-finder-hpa
  namespace: whole-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: job-finder
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: email-agent-hpa
  namespace: whole-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: email-agent
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
