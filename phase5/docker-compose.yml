version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: email_agent
    ports:
      - "5433:5432"
    volumes:
      - email_agent_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  email_agent:
    build: ./email_agent
    environment:
      DATABASE_URL: postgresql://admin:password@postgres/email_agent
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
    ports:
      - "8005:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  celery_worker:
    build: ./email_agent
    command: celery -A email_agent.app.celery_worker.app worker -Q email_sender --loglevel=info
    environment:
      DATABASE_URL: postgresql://admin:password@postgres/email_agent
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
    depends_on:
      - postgres
      - redis
      - rabbitmq

volumes:
  email_agent_postgres_data:
